version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: demo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo_games
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    container_name: demo_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"